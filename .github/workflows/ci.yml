name: Tempo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q app scripts
      - run: pytest -q

  android:
    name: Android compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Compile debug Kotlin
        working-directory: android
        run: ./gradlew :app:compileDebugKotlin --no-daemon -PTEMPO_API_BASE_URL=https://ci.invalid/

  security:
    name: Secret and repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tracked files for common secrets
        run: bash tools/check_secrets.sh
      - name: Check patch formatting
        run: git diff --check "$(git rev-list --max-count=1 HEAD^ 2>/dev/null || git rev-parse HEAD)" HEAD
